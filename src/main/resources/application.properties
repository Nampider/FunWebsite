spring.application.name=private-chat-backend
spring.threads.virtual.enabled=true
spring.main.keep-alive=true
server.port=${PORT:8080}
server.shutdown=graceful
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:none}
server.error.include-message=never
server.error.include-stacktrace=never
server.servlet.session.timeout=2h
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:none}
chat.persistence=memory
chat.allowed-origins=${CHAT_FRONTEND_ORIGIN:http://localhost:5173}
chat.max-message-length=500
chat.in-memory-history-limit=100
chat.max-frame-size-bytes=4096
chat.max-messages-per-second=5
chat.debug-endpoints-enabled=${CHAT_DEBUG_ENDPOINTS_ENABLED:false}
chat.users[0].username=chris
chat.users[0].password=${CHAT_CHRIS_PASSWORD}
chat.users[1].username=audrey
chat.users[1].password=${CHAT_AUDREY_PASSWORD}
chat.users[2].username=audrey
chat.users[2].password=${CHAT_AUDREY_PASSWORD}


management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
spring.lifecycle.timeout-per-shutdown-phase=20s
