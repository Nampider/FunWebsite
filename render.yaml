services:
  - type: web
    name: kinline-backend
    runtime: docker
    plan: free
    numInstances: 1
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: CHAT_CHRIS_PASSWORD
        sync: false
      - key: CHAT_AUDREY_PASSWORD
        sync: false
      - key: CHAT_PARKER_PASSWORD
        sync: false
      - key: CHAT_FRONTEND_ORIGIN
        value: https://kinline-frontend-d19e.onrender.com/
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: FORWARD_HEADERS_STRATEGY
        value: framework
      - key: CHAT_DEBUG_ENDPOINTS_ENABLED
        value: "false"
